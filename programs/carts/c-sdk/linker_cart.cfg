SYMBOLS {
    __STACKSTART__: type = weak, value = $8000;
    __STACKSIZE__:  type = weak, value = $0800;
    __ZPSTART__:    type = weak, value = $0082;
}

MEMORY {
    ZP:   start = $0082, size = $007E, type = rw, define = yes;
    RAM:  start = $0400, size = $7C00, type = rw, define = yes;
    CART: start = $8000, size = $4000, type = ro, fill = no, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,   type = zp;
    STARTUP:  load = CART, type = ro;
    LOWCODE:  load = CART, type = ro, optional = yes;
    ONCE:     load = CART, type = ro, optional = yes;
    CODE:     load = CART, type = ro;
    RODATA:   load = CART, type = ro;
    DATA:     load = CART, run = RAM, type = rw, define = yes;
    BSS:      load = RAM,  type = bss, define = yes;
}

FEATURES {
    CONDES: type = constructor, label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__, segment = RODATA;
    CONDES: type = destructor, label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__, segment = RODATA;
}
