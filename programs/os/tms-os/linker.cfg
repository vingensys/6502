MEMORY {
    ZP:      start = $0000, size = $0080, type = rw, define = yes;
    RAM:     start = $0200, size = $0200, type = rw, define = yes;
    STARTROM:start = $E000, size = $0100, type = ro, fill = yes, file = %O;
    ABI:     start = $E100, size = $000F, type = ro, fill = yes, file = %O;
    ROM:     start = $E10F, size = $1EEB, type = ro, fill = yes, file = %O;
    VECTORS: start = $FFFA, size = $0006, type = ro, fill = yes, file = %O;
}

SEGMENTS {
    ZEROPAGE: load = ZP,      type = zp;
    STARTUP:  load = STARTROM,type = ro;
    ABI:      load = ABI,     type = ro;
    CODE:     load = ROM,     type = ro;
    RODATA:   load = ROM,     type = ro;
    DATA:     load = ROM,     run = RAM, type = rw, define = yes;
    BSS:      load = RAM,     type = bss, define = yes;
    VECTORS:  load = VECTORS, type = ro;
}

FEATURES {
    CONDES: type = constructor, label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__, segment = RODATA;
    CONDES: type = destructor, label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__, segment = RODATA;
}
